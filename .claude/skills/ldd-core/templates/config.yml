github:
  repo: "{repo}"
  default_branch: "{default_branch}"

artifacts:
  root: docs/tickets

branches:
  prd: ldd/prd/{issue}
  sdd_plan: ldd/sdd-plan/{issue}
  implementation: ldd/impl/{issue}

prs:
  prd_title: "PRD: {title}"
  sdd_plan_title: "SDD + Plan: {title}"
  implementation_title: "{title}"

renderer:
  plan_html: true

adr:
  directory: docs/adr
  update_policy: immutable_superseded
  filename_style: dated_slug
