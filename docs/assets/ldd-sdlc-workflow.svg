<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" role="img" aria-labelledby="title desc">
  <title id="title">Ledger-Driven Development workflow mapped to common SDLC phases</title>
  <desc id="desc">A role-lane workflow showing how Ledger-Driven Development maps Planning, Requirements Analysis, Design, Development, Testing, Deployment, and Maintenance and Continuous Feedback to Product Manager, Engineering Manager or Tech Lead, Software Engineers, Engineering Review, and Technical Program Manager visibility.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 800 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .phase-label { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .phase-small { font: 600 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e0f2fe; }
      .column-title { font: 800 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .column-subtitle { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; text-transform: uppercase; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .mono { font: 700 17px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0f172a; }
      .small { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .bar-title { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .bar-body { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .approval { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #064e3b; }
      .outline { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; }
      .chip { fill: #eef6ff; stroke: #bfdbfe; stroke-width: 1.5; }
      .muted-chip { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrowhead); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 9 9; marker-end: url(#arrowhead-muted); }
    </style>
    <marker id="arrowhead" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-muted" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <linearGradient id="phaseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ledgerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="1260"/>

  <text x="70" y="70" class="title">LDD maps AI delivery onto the Software Development Life Cycle</text>
  <text x="70" y="112" class="subtitle">Common SDLC phases stay recognizable; Ledger-Driven Development adds role-owned inputs, skills, outputs, approvals, and evidence.</text>

  <g transform="translate(60 145)">
    <rect x="0" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="24" y="38" class="phase-label">Planning</text>
    <text x="24" y="65" class="phase-small">roadmap, feasibility, risk</text>

    <rect x="242" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="266" y="32" class="phase-label">Requirements</text>
    <text x="266" y="59" class="phase-label">Analysis</text>

    <rect x="484" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="508" y="38" class="phase-label">Design</text>
    <text x="508" y="65" class="phase-small">architecture, interfaces</text>

    <rect x="726" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="750" y="38" class="phase-label">Development</text>
    <text x="750" y="65" class="phase-small">code, unit tests, integration</text>

    <rect x="968" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="992" y="38" class="phase-label">Testing</text>
    <text x="992" y="65" class="phase-small">quality, regression, evidence</text>

    <rect x="1210" y="0" width="230" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="1234" y="38" class="phase-label">Deployment</text>
    <text x="1234" y="65" class="phase-small">release readiness</text>

    <rect x="1452" y="0" width="288" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="1476" y="32" class="phase-label">Maintenance &amp;</text>
    <text x="1476" y="59" class="phase-label">Continuous Feedback</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="285" width="405" height="640" rx="22" class="outline"/>
    <rect x="485" y="285" width="405" height="640" rx="22" class="outline"/>
    <rect x="910" y="285" width="405" height="640" rx="22" class="outline"/>
    <rect x="1335" y="285" width="405" height="640" rx="22" class="outline"/>
  </g>

  <g transform="translate(90 325)">
    <text x="0" y="0" class="column-title">Product Manager</text>
    <rect x="0" y="24" width="270" height="34" rx="17" class="chip"/>
    <text x="17" y="47" class="column-subtitle">Planning + Requirements Analysis</text>

    <text x="0" y="100" class="section">Inputs</text>
    <text x="0" y="132" class="body">customer pain</text>
    <text x="0" y="160" class="body">business goal</text>
    <text x="0" y="188" class="body">roadmap context</text>
    <text x="0" y="216" class="body">workflow constraints</text>

    <text x="0" y="276" class="section">LDD skills</text>
    <text x="0" y="309" class="mono">/ldd:research</text>
    <text x="0" y="337" class="mono">/ldd:scope</text>
    <text x="0" y="365" class="mono">/ldd:elaborate</text>
    <text x="0" y="393" class="mono">/ldd:refine</text>
    <text x="0" y="421" class="mono">/ldd:approve</text>

    <text x="0" y="481" class="section">Outputs</text>
    <text x="0" y="514" class="mono">research.md</text>
    <text x="0" y="542" class="mono">approved prd.md</text>
  </g>

  <g transform="translate(515 325)">
    <text x="0" y="0" class="column-title">Engineering Manager</text>
    <text x="0" y="32" class="column-title">/ Tech Lead</text>
    <rect x="0" y="58" width="110" height="34" rx="17" class="chip"/>
    <text x="17" y="81" class="column-subtitle">Design</text>

    <text x="0" y="130" class="section">Inputs</text>
    <text x="0" y="162" class="body">approved PRD</text>
    <text x="0" y="190" class="body">repo context</text>
    <text x="0" y="218" class="body">Architecture Decision Records</text>
    <text x="0" y="246" class="body">technical constraints</text>
    <text x="0" y="274" class="body">related repositories</text>

    <text x="0" y="334" class="section">LDD skills</text>
    <text x="0" y="367" class="mono">/ldd:design</text>
    <text x="0" y="395" class="mono">/ldd:plan</text>
    <text x="0" y="423" class="mono">/ldd:approve</text>
    <text x="0" y="451" class="mono">/ldd:decompose</text>

    <text x="0" y="511" class="section">Outputs</text>
    <text x="0" y="544" class="mono">repo-scoped sdd.md</text>
    <text x="0" y="572" class="mono">plan.md + plan.html</text>
    <text x="0" y="600" class="body">child vertical-slice tickets</text>
  </g>

  <g transform="translate(940 325)">
    <text x="0" y="0" class="column-title">Software Engineers</text>
    <rect x="0" y="24" width="160" height="34" rx="17" class="chip"/>
    <text x="17" y="47" class="column-subtitle">Development</text>

    <text x="0" y="100" class="section">Inputs</text>
    <text x="0" y="132" class="body">ready child ticket</text>
    <text x="0" y="160" class="body">approved plan</text>
    <text x="0" y="188" class="body">codebase and tests</text>
    <text x="0" y="216" class="body">documentation obligation</text>

    <text x="0" y="276" class="section">LDD skills</text>
    <text x="0" y="309" class="mono">/ldd:implement &lt;ticket&gt;</text>
    <text x="0" y="337" class="mono">/ldd:implement ALL</text>
    <rect x="0" y="363" width="310" height="42" rx="14" class="muted-chip"/>
    <text x="18" y="390" class="small">built-in Test-Driven Development</text>

    <text x="0" y="465" class="section">Outputs</text>
    <text x="0" y="498" class="body">bounded code diff or Pull Request</text>
    <text x="0" y="526" class="body">test evidence</text>
    <text x="0" y="554" class="body">implementation evidence</text>
    <text x="0" y="582" class="body">documentation impact evidence</text>
  </g>

  <g transform="translate(1365 325)">
    <text x="0" y="0" class="column-title">Engineering Review</text>
    <rect x="0" y="24" width="330" height="34" rx="17" class="chip"/>
    <text x="17" y="47" class="column-subtitle">Testing + Deployment + Maintenance</text>

    <text x="0" y="100" class="section">Inputs</text>
    <text x="0" y="132" class="body">implementation evidence</text>
    <text x="0" y="160" class="body">required checks</text>
    <text x="0" y="188" class="body">approved artifacts</text>
    <text x="0" y="216" class="body">Pull Request state</text>
    <text x="0" y="244" class="body">drift metadata</text>

    <text x="0" y="304" class="section">LDD skills</text>
    <text x="0" y="337" class="mono">/ldd:verify</text>
    <text x="0" y="365" class="mono">/ldd:close</text>
    <text x="0" y="393" class="mono">/ldd:archive</text>

    <text x="0" y="465" class="section">Outputs</text>
    <text x="0" y="498" class="mono">verification.md</text>
    <text x="0" y="526" class="body">closed ledger state</text>
    <text x="0" y="554" class="body">optional tracker projection</text>
  </g>

  <path d="M465 590 H485" class="arrow"/>
  <path d="M890 590 H910" class="arrow"/>
  <path d="M1315 590 H1335" class="arrow"/>

  <rect x="388" y="945" width="195" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="412" y="970" class="approval">PRD approval gate</text>
  <rect x="800" y="945" width="225" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="824" y="970" class="approval">SDD + plan approval gate</text>
  <rect x="1222" y="945" width="196" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1246" y="970" class="approval">verification gate</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1015" width="1680" height="70" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="90" y="1051" class="bar-title">Technical Program Managers and delivery stakeholders</text>
  <text x="90" y="1077" class="bar-body">Use the same workflow for roadmap, dependency, sequencing, review-load, and status visibility; they do not own a separate LDD artifact or approval gate.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1110" width="1680" height="62" rx="22" fill="url(#ledgerGrad)" stroke="#bae6fd" stroke-width="2"/>
  </g>
  <text x="90" y="1148" class="bar-title">Canonical workflow state</text>
  <text x="405" y="1148" class="bar-body">repo-local </text>
  <text x="505" y="1148" class="mono">ledger.yml</text>
  <text x="610" y="1148" class="bar-body">records phase, gate, approved inputs, next action, external links, and evidence.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1190" width="1680" height="50" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="90" y="1222" class="bar-body">Planning and review projections: GitHub first; Jira, Asana, Linear, Trello, and internal trackers are integration targets, not canonical state.</text>
</svg>
