<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" role="img" aria-labelledby="title desc">
  <title id="title">Ledger-Driven Development workflow from requirements analysis to verified implementation</title>
  <desc id="desc">A four-lane workflow showing how Ledger-Driven Development maps Requirements Analysis, Design, Development, and Testing or Verification to Product and Repo Context, Technical Design, Software Engineering, and Engineering Review, with delivery visibility and canonical ledger state across all lanes.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 23px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .phase-label { font: 800 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .phase-small { font: 600 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dff7ef; }
      .column-title { font: 800 27px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .column-subtitle { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .section { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; text-transform: uppercase; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .mono { font: 700 17px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0f172a; }
      .small { font: 700 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .bar-title { font: 800 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .bar-body { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .approval { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #064e3b; }
      .outline { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; }
      .phase-chip { fill: #eef6ff; stroke: #bfdbfe; stroke-width: 1.5; }
      .engineering-chip { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; }
      .muted-chip { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L11,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="phaseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ledgerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="50%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="1220"/>

  <text x="70" y="70" class="title">Where LDD fits in the Software Development Life Cycle</text>
  <text x="70" y="112" class="subtitle">LDD governs the requirements-to-verified-implementation slice: clear inputs, role-aware skills, approved artifacts, and evidence.</text>

  <g transform="translate(60 145)">
    <rect x="0" y="0" width="405" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="24" y="38" class="phase-label">Requirements Analysis</text>
    <text x="24" y="65" class="phase-small">repo-informed product scope</text>

    <rect x="425" y="0" width="405" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="449" y="38" class="phase-label">Design</text>
    <text x="449" y="65" class="phase-small">architecture, interfaces, plan</text>

    <rect x="850" y="0" width="405" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="874" y="38" class="phase-label">Development</text>
    <text x="874" y="65" class="phase-small">TDD, code, refactor, docs impact</text>

    <rect x="1275" y="0" width="405" height="88" rx="18" fill="url(#phaseGrad)"/>
    <text x="1299" y="38" class="phase-label">Testing / Verification</text>
    <text x="1299" y="65" class="phase-small">review evidence and closure readiness</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="285" width="405" height="650" rx="22" class="outline"/>
    <rect x="485" y="285" width="405" height="650" rx="22" class="outline"/>
    <rect x="910" y="285" width="405" height="650" rx="22" class="outline"/>
    <rect x="1335" y="285" width="405" height="650" rx="22" class="outline"/>
  </g>

  <g transform="translate(90 325)">
    <text x="0" y="0" class="column-title">Product + Repo Context</text>
    <rect x="0" y="24" width="215" height="34" rx="17" class="phase-chip"/>
    <text x="17" y="47" class="column-subtitle">Requirements Analysis</text>

    <text x="0" y="95" class="section">Inputs</text>
    <text x="0" y="127" class="body">customer pain</text>
    <text x="0" y="155" class="body">business goal and roadmap context</text>
    <text x="0" y="183" class="body">current workflow and constraints</text>
    <text x="0" y="211" class="body">existing product behavior</text>
    <text x="0" y="239" class="body">repository docs and code context</text>

    <text x="0" y="295" class="section">LDD skills</text>
    <text x="0" y="328" class="mono">/ldd:research</text>
    <text x="0" y="356" class="mono">/ldd:scope</text>
    <text x="0" y="384" class="mono">/ldd:elaborate</text>
    <text x="0" y="412" class="mono">/ldd:refine</text>
    <text x="0" y="440" class="mono">/ldd:approve</text>

    <text x="0" y="500" class="section">Outputs</text>
    <text x="0" y="533" class="mono">approved prd.md</text>
    <text x="0" y="561" class="body">acceptance criteria and non-goals</text>
    <text x="0" y="589" class="body">repo-informed constraints and risks</text>
  </g>

  <g transform="translate(515 325)">
    <text x="0" y="0" class="column-title">Technical Design</text>
    <rect x="0" y="24" width="330" height="34" rx="17" class="phase-chip"/>
    <text x="17" y="47" class="column-subtitle">Architect / Tech Lead / Senior Engineers</text>

    <text x="0" y="95" class="section">Inputs</text>
    <text x="0" y="127" class="body">approved PRD</text>
    <text x="0" y="155" class="body">repo context and related repos</text>
    <text x="0" y="183" class="body">Architecture Decision Records</text>
    <text x="0" y="211" class="body">technical constraints</text>
    <text x="0" y="239" class="body">contract and sequencing risks</text>

    <text x="0" y="295" class="section">LDD skills</text>
    <text x="0" y="328" class="mono">/ldd:design</text>
    <text x="0" y="356" class="mono">/ldd:plan</text>
    <text x="0" y="384" class="mono">/ldd:approve</text>
    <text x="0" y="412" class="mono">/ldd:decompose</text>

    <text x="0" y="500" class="section">Outputs</text>
    <text x="0" y="533" class="mono">repo-scoped sdd.md</text>
    <text x="0" y="561" class="mono">plan.md + plan.html</text>
    <text x="0" y="589" class="body">child vertical-slice tickets</text>
  </g>

  <g transform="translate(940 325)">
    <text x="0" y="0" class="column-title">Software Engineering</text>
    <rect x="0" y="24" width="168" height="34" rx="17" class="engineering-chip"/>
    <text x="17" y="47" class="column-subtitle">Software Engineers</text>

    <text x="0" y="95" class="section">Inputs</text>
    <text x="0" y="127" class="body">ready child ticket</text>
    <text x="0" y="155" class="body">approved plan</text>
    <text x="0" y="183" class="body">codebase and tests</text>
    <text x="0" y="211" class="body">documentation obligation</text>

    <text x="0" y="267" class="section">LDD skills</text>
    <text x="0" y="300" class="mono">/ldd:implement &lt;ticket&gt;</text>
    <text x="0" y="328" class="mono">/ldd:implement ALL</text>
    <rect x="0" y="354" width="310" height="42" rx="14" class="muted-chip"/>
    <text x="18" y="381" class="small">built-in Test-Driven Development</text>

    <text x="0" y="455" class="section">Outputs</text>
    <text x="0" y="488" class="body">bounded code diff or Pull Request</text>
    <text x="0" y="516" class="body">tests, refactoring, local design choices</text>
    <text x="0" y="544" class="body">implementation evidence</text>
    <text x="0" y="572" class="body">documentation impact evidence</text>
  </g>

  <g transform="translate(1365 325)">
    <text x="0" y="0" class="column-title">Engineering Review</text>
    <rect x="0" y="24" width="272" height="34" rx="17" class="phase-chip"/>
    <text x="17" y="47" class="column-subtitle">Peer review + QA where applicable</text>

    <text x="0" y="95" class="section">Inputs</text>
    <text x="0" y="127" class="body">implementation evidence</text>
    <text x="0" y="155" class="body">required checks</text>
    <text x="0" y="183" class="body">approved artifacts</text>
    <text x="0" y="211" class="body">Pull Request state</text>
    <text x="0" y="239" class="body">drift metadata</text>

    <text x="0" y="295" class="section">LDD skills</text>
    <text x="0" y="328" class="mono">/ldd:verify</text>
    <text x="0" y="356" class="mono">/ldd:close</text>
    <text x="0" y="384" class="mono">/ldd:archive</text>

    <text x="0" y="455" class="section">Outputs</text>
    <text x="0" y="488" class="mono">verification.md</text>
    <text x="0" y="516" class="body">closure readiness</text>
    <text x="0" y="544" class="body">closed ledger state</text>
    <text x="0" y="572" class="body">optional tracker projection</text>
  </g>

  <path d="M465 590 H485" class="arrow"/>
  <path d="M890 590 H910" class="arrow"/>
  <path d="M1315 590 H1335" class="arrow"/>

  <rect x="388" y="955" width="195" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="412" y="980" class="approval">PRD approval gate</text>
  <rect x="800" y="955" width="225" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="824" y="980" class="approval">SDD + plan approval gate</text>
  <rect x="1222" y="955" width="196" height="38" rx="19" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="1246" y="980" class="approval">verification gate</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1020" width="1680" height="64" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <text x="90" y="1057" class="bar-title">Delivery visibility</text>
  <text x="315" y="1057" class="bar-body">EMs, TPMs, PMs, and stakeholders track sequencing, capacity, dependencies, roadmap, review load, and status.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1100" width="1680" height="62" rx="22" fill="url(#ledgerGrad)" stroke="#bae6fd" stroke-width="2"/>
  </g>
  <text x="90" y="1138" class="bar-title">Canonical workflow state</text>
  <text x="405" y="1138" class="bar-body">repo-local </text>
  <text x="505" y="1138" class="mono">ledger.yml</text>
  <text x="610" y="1138" class="bar-body">records phase, gate, approved inputs, next action, external links, and evidence.</text>

  <text x="90" y="1192" class="bar-body">Outside this slice, release operations and long-term maintenance remain in the team's existing deployment, operations, and support processes.</text>
</svg>
