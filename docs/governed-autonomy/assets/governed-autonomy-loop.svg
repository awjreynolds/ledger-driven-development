<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="360" viewBox="0 0 1160 360" role="img" aria-labelledby="title desc">
  <title id="title">Governed Autonomy loop</title>
  <desc id="desc">Map the process, define delegation boundary, run autonomous execution, capture evidence, decide whether a boundary was reached, then measure outcome or escalate and approve.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#333;stroke-width:2}
      .decision{fill:#fff;stroke:#333;stroke-width:2}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#111;text-anchor:middle}
      .edge{fill:none;stroke:#333;stroke-width:2;marker-end:url(#arrow)}
      .edge-label{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#111;text-anchor:middle}
    </style>
  </defs>
  <rect class="box" x="30" y="120" width="150" height="64" rx="4"/>
  <text class="label" x="105" y="147"><tspan x="105">Map the</tspan><tspan x="105" dy="20">process</tspan></text>
  <rect class="box" x="230" y="120" width="190" height="64" rx="4"/>
  <text class="label" x="325" y="147"><tspan x="325">Define delegation</tspan><tspan x="325" dy="20">boundary</tspan></text>
  <rect class="box" x="470" y="120" width="180" height="64" rx="4"/>
  <text class="label" x="560" y="147"><tspan x="560">Autonomous</tspan><tspan x="560" dy="20">execution</tspan></text>
  <rect class="box" x="700" y="120" width="160" height="64" rx="4"/>
  <text class="label" x="780" y="157">Capture evidence</text>
  <polygon class="decision" points="980,108 1090,152 980,196 870,152"/>
  <text class="label" x="980" y="147"><tspan x="980">Boundary</tspan><tspan x="980" dy="20">reached?</tspan></text>
  <rect class="box" x="895" y="260" width="170" height="64" rx="4"/>
  <text class="label" x="980" y="297">Measure outcome</text>
  <rect class="box" x="690" y="20" width="180" height="64" rx="4"/>
  <text class="label" x="780" y="57">Escalate or approve</text>
  <path class="edge" d="M180 152 H230"/>
  <path class="edge" d="M420 152 H470"/>
  <path class="edge" d="M650 152 H700"/>
  <path class="edge" d="M860 152 H870"/>
  <path class="edge" d="M980 196 V260"/>
  <text class="edge-label" x="1004" y="234">No</text>
  <path class="edge" d="M980 108 V52 H870"/>
  <text class="edge-label" x="1004" y="84">Yes</text>
  <path class="edge" d="M690 52 H560 V120"/>
  <path class="edge" d="M895 292 H105 V184"/>
</svg>
