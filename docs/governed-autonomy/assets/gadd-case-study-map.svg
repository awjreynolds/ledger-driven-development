<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="500" viewBox="0 0 1220 500" role="img" aria-labelledby="title desc">
  <title id="title">GADD case study map</title>
  <desc id="desc">Governed Autonomy principle maps to role boundaries, scope boundaries, evidence, approval, and canonical state, which map to GADD expressions.</desc>
  <rect width="100%" height="100%" fill="#fff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#333;stroke-width:2}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#111;text-anchor:middle}
      .edge{fill:none;stroke:#333;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="30" y="208" width="210" height="64" rx="4"/>
  <text class="label" x="135" y="235"><tspan x="135">Governed Autonomy</tspan><tspan x="135" dy="20">principle</tspan></text>
  <rect class="box" x="330" y="40" width="170" height="52" rx="4"/>
  <text class="label" x="415" y="72">Role boundaries</text>
  <rect class="box" x="330" y="125" width="170" height="52" rx="4"/>
  <text class="label" x="415" y="157">Scope boundaries</text>
  <rect class="box" x="330" y="210" width="170" height="52" rx="4"/>
  <text class="label" x="415" y="242">Evidence</text>
  <rect class="box" x="330" y="295" width="170" height="52" rx="4"/>
  <text class="label" x="415" y="327">Approval</text>
  <rect class="box" x="330" y="380" width="170" height="52" rx="4"/>
  <text class="label" x="415" y="412">Canonical state</text>
  <rect class="box" x="650" y="40" width="390" height="52" rx="4"/>
  <text class="label" x="845" y="72">PM / EM-Tech Lead / SE / Review lanes</text>
  <rect class="box" x="650" y="125" width="390" height="52" rx="4"/>
  <text class="label" x="845" y="157">PRD / SDD / plan / Work Items</text>
  <rect class="box" x="650" y="210" width="390" height="52" rx="4"/>
  <text class="label" x="845" y="242">Research / artifacts / tests / verification</text>
  <rect class="box" x="650" y="295" width="390" height="52" rx="4"/>
  <text class="label" x="845" y="327">gadd:approve and closure confirmation</text>
  <rect class="box" x="650" y="380" width="390" height="52" rx="4"/>
  <text class="label" x="845" y="412">repo-local ledger.yml</text>
  <path class="edge" d="M240 240 C285 240 285 66 330 66"/>
  <path class="edge" d="M240 240 C285 240 285 151 330 151"/>
  <path class="edge" d="M240 240 H330"/>
  <path class="edge" d="M240 240 C285 240 285 321 330 321"/>
  <path class="edge" d="M240 240 C285 240 285 406 330 406"/>
  <path class="edge" d="M500 66 H650"/>
  <path class="edge" d="M500 151 H650"/>
  <path class="edge" d="M500 236 H650"/>
  <path class="edge" d="M500 321 H650"/>
  <path class="edge" d="M500 406 H650"/>
</svg>
