<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="180" viewBox="0 0 1260 180" role="img" aria-labelledby="title desc">
  <title id="title">Business process autonomy ladder</title>
  <desc id="desc">Assist leads to recommend, draft, execute with approval, execute within limits, and autonomous with monitoring.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .box{fill:#fff;stroke:#333;stroke-width:2}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#111;text-anchor:middle}
      .edge{fill:none;stroke:#333;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="30" y="58" width="150" height="64" rx="4"/>
  <text class="label" x="105" y="96">Assist</text>
  <rect class="box" x="225" y="58" width="150" height="64" rx="4"/>
  <text class="label" x="300" y="96">Recommend</text>
  <rect class="box" x="420" y="58" width="150" height="64" rx="4"/>
  <text class="label" x="495" y="96">Draft</text>
  <rect class="box" x="615" y="58" width="180" height="64" rx="4"/>
  <text class="label" x="705" y="84"><tspan x="705">Execute with</tspan><tspan x="705" dy="20">approval</tspan></text>
  <rect class="box" x="840" y="58" width="180" height="64" rx="4"/>
  <text class="label" x="930" y="84"><tspan x="930">Execute within</tspan><tspan x="930" dy="20">limits</tspan></text>
  <rect class="box" x="1065" y="58" width="170" height="64" rx="4"/>
  <text class="label" x="1150" y="84"><tspan x="1150">Autonomous with</tspan><tspan x="1150" dy="20">monitoring</tspan></text>
  <path class="edge" d="M180 90 H225"/>
  <path class="edge" d="M375 90 H420"/>
  <path class="edge" d="M570 90 H615"/>
  <path class="edge" d="M795 90 H840"/>
  <path class="edge" d="M1020 90 H1065"/>
</svg>
