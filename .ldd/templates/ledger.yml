schema_version: 1

ticket:
  id: null
  draft_id: "{draft_id}"
  title: "{title}"
  kind: product_requirement
  status: draft

tracker:
  mode: local
  external_id: null
  external_url: null

artifacts:
  research:
    path: null
    status: missing
  prd:
    path: "{ticket_dir}/prd.md"
    status: draft
  sdd:
    path: null
    status: missing
  plan:
    path: null
    status: missing
  implementation:
    status: not_started
  verification:
    path: null
    status: missing

children: []

closure:
  status: open
  verified_at: null
  archived_at: null
  external_closed_at: null
  override_reason: null

execution_context:
  phase: scope
  current_gate: scope
  next_command: /ldd:elaborate
  next_human_action: null
  next_reason: Draft Product Requirement exists and needs elaboration before approval.
  approved_artifacts:
    prd: null
    sdd: null
    plan: null
  boundaries:
    product: "{ticket_dir}/prd.md"
    design: null
    plan: null
  updated_at: "{created_at}"

sync:
  status: local_only
  last_checked_at: null
  external_updated_at: null
  external_body_hash: null
  managed_body_version: 1

events:
  - at: "{created_at}"
    type: draft_created
    actor: human
